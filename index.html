      // Restore path from 404 redirect
      (function() {
        var redirect = sessionStorage.getItem('spa_redirect');

          sessionStorage.removeItem('spa_redirect');
          window.history.replaceState(null, '', '/portfolio' + redirect);
        }
      })();
    </script>
